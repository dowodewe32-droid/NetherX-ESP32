[env:esp32doit-devkit-v1]
platform = espressif32@6.4.0
board = esp32doit-devkit-v1
framework = arduino
board_build.partitions = huge_app.csv
monitor_speed = 115200
upload_speed = 921600
build_flags = 
	-DCORE_DEBUG_LEVEL=0
	-DCONFIG_ESP_WIFI_STATIC_TX_BUFFER=y
	-DCONFIG_ESP_WIFI_DYNAMIC_TX_BUFFER=y
	-DCONFIG_ESP_WIFI_TX_BUFFER=y